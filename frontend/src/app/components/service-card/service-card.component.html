<div class="service-card" [ngClass]="{'card-alt': index % 2 === 1}">
  <!-- Subtle Outlined Architectural Drawing Frames (Like Sobre Nosotros!) -->
  <div class="arch-plan-box-top"></div>
  <div class="arch-plan-box-bottom"></div>
  <div class="arch-corner-line"></div>

  <!-- Horizontal Architectural Blueprint Structure -->
  <div class="card-left-col">
    <span class="card-number font-serif">0{{ index + 1 }}</span>
    
    <div class="icon-box">
      <!-- SVG Icons based on servicio.icono -->
      <ng-container [ngSwitch]="servicio.icono">
        <svg *ngSwitchCase="'architecture'" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M9 8h1"/><path d="M9 12h1"/><path d="M9 16h1"/><path d="M14 8h1"/><path d="M14 12h1"/><path d="M14 16h1"/><path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"/></svg>
        <svg *ngSwitchCase="'construction'" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 18h20"/><path d="M10 2v16"/><path d="M14 2v16"/><path d="M4 10h16"/><path d="M4 14h16"/></svg>
        <svg *ngSwitchCase="'remodel'" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
        <svg *ngSwitchCase="'consulting'" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <svg *ngSwitchDefault xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
      </ng-container>
    </div>
  </div>

  <div class="card-right-col">
    <div>
      <p class="card-subtitle font-sans">{{ servicio.subtitulo }}</p>
      <h3 class="card-title font-serif">{{ servicio.titulo }}</h3>
      
      <div class="arch-divider"></div>

      <p class="card-desc font-sans">{{ servicio.descripcion }}</p>
    </div>

    <div class="card-footer">
      <a routerLink="/contacto" [queryParams]="{servicio: servicio.titulo}" class="card-cta font-sans">
        <span>Solicitar Servicio</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </a>
    </div>
  </div>
</div>
