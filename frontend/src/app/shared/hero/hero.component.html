<section class="hero-section">
  <!-- Elegant Background Carousel with dream-like cross-dissolve -->
  <div class="hero-carousel">
    <div *ngFor="let slide of slides; let i = index" class="slide-bg" [ngClass]="{'active': currentSlide() === i}"
      [style.background-image]="'url(' + slide.image + ')'">
    </div>
    <div class="hero-overlay"></div>
  </div>

  <!-- Elegant Carousel Indicator / Controls (Bottom Right) -->
  <div class="carousel-controls font-sans">
    <div class="slide-info">
      <span class="slide-loc">📍 {{ slides[currentSlide()].location }}</span>
      <span class="slide-title font-serif">{{ slides[currentSlide()].title }}</span>
    </div>
    <div class="carousel-indicators">
      <button *ngFor="let slide of slides; let i = index" (click)="setSlide(i)"
        [ngClass]="{'active': currentSlide() === i}" class="indicator-btn" [attr.aria-label]="'Ir a ' + slide.title">
        <span class="progress-bar"></span>
      </button>
    </div>
  </div>

  <div class="container hero-content flex flex-col items-center justify-center text-center relative z-10">

    <h1 class="hero-title font-serif">
      Diseñamos <span class="text-gradient font-serif">Hogares</span>
    </h1>

    <p class="hero-subtitle max-w-2xl mx-auto">
      {{ brand.subtagline }}. Creamos obras residenciales de alto nivel donde la arquitectura moderna, los materiales
      nobles y la habitabilidad se unen en perfecta armonía.
    </p>

    <div class="hero-actions flex flex-wrap items-center justify-center gap-4 my-8">
      <!-- Primary CTA: Cotiza con nosotros -->
      <a routerLink="/cotiza-con-nosotros" class="btn-primary">
        <span>Cotiza con nosotros</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14" />
          <path d="m12 5 7 7-7 7" />
        </svg>
      </a>

      <!-- Secondary CTA: Conócenos -->
      <button (click)="scrollToSection('nosotros-section')" class="btn-secondary">
        <span>Conócenos</span>
      </button>
    </div>


  </div>

  <!-- Scroll Down indicator -->
  <div class="scroll-indicator" (click)="scrollToSection('nosotros-section')">
    <span class="scroll-txt">Explorar</span>
    <div class="scroll-line"></div>
  </div>
</section>
