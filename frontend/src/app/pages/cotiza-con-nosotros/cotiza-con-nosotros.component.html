<div class="cotiza-page min-h-screen pt-[68px] pb-6 bg-white text-black relative overflow-hidden font-sans flex flex-col justify-center">
  <!-- Luz ambiental decorativa arquitectónica sutil -->
  <div class="absolute top-0 left-1/4 w-[600px] h-[600px] rounded-full bg-gray-100/40 blur-[160px] pointer-events-none"></div>
  <div class="absolute bottom-10 right-10 w-[500px] h-[500px] rounded-full bg-gray-100/30 blur-[150px] pointer-events-none"></div>

  <!-- Contenedor 100% Ancho Sin Padding Lateral -->
  <div class="w-full px-0 mx-0 relative z-10">
    <!-- Grilla Principal 100% Ancho: Video Ajustado (8 cols) + Formulario de Lujo (4 cols) -->
    <div class="grid grid-cols-1 lg:grid-cols-12 min-h-[500px] lg:h-[calc(100vh-160px)] lg:max-h-[760px] items-stretch border-y border-gray-100">
      
      <!-- COLUMNA IZQUIERDA: VIDEO ARQUITECTÓNICO (Cols 1-8) -->
      <div class="lg:col-span-8 relative flex flex-col justify-center overflow-hidden bg-white min-h-[380px] lg:min-h-full group">
        <!-- Reproductor de Video en Gran Formato con Colores Invertidos -->
        <video #bgVideo autoplay loop muted playsinline [muted]="true" [volume]="0" onloadedmetadata="this.muted=true; this.volume=0;" class="absolute inset-0 w-full h-full object-cover transform scale-[1.01] transition-transform duration-1000 group-hover:scale-[1.03] invert" style="filter: invert(1);">
          <source src="assets/videos/sysmicon3.mp4" type="video/mp4">
          Tu navegador no soporta el formato de video.
        </video>
      </div>

      <!-- COLUMNA DERECHA: CUADRO "HABLAR CON NOSOTROS" DE ALTA ELEGANCIA (Cols 9-12) -->
      <div class="lg:col-span-4 flex flex-col justify-center bg-white border-l border-gray-200 p-6 sm:p-8 lg:p-10 xl:p-12 shadow-[0_15px_50px_rgba(0,0,0,0.04)] relative z-20 min-h-full">
        
        <div class="flex flex-col justify-between h-full space-y-7">
          <div>
            <!-- Título Limpio y Directo -->
            <div class="mb-6">
              <h2 class="font-serif text-3xl xl:text-4xl font-normal text-[#111111] tracking-tight">
                Hablar con nosotros
              </h2>
              <p class="text-gray-500 text-xs font-sans mt-1.5 leading-relaxed">
                Déjanos tus datos y te contactaremos de inmediato.
              </p>
            </div>

            <!-- Formulario Minimalista con Inputs Claros -->
            <form *ngIf="!enviado()" (submit)="enviarMensaje($event)" class="space-y-3.5">
              
              <div class="grid grid-cols-1 gap-3.5">
                <!-- Campo Nombre -->
                <div class="form-group">
                  <label for="nombre" class="block font-sans text-[11px] font-bold tracking-[0.18em] uppercase text-gray-800 mb-1.5">Nombre</label>
                  <input type="text" id="nombre" name="nombre"
                         [ngModel]="nombre()" (ngModelChange)="nombre.set($event)"
                         placeholder="Tu nombre completo"
                         class="w-full px-4 py-3.5 rounded-xl bg-gray-50 border border-gray-200 text-gray-900 placeholder-gray-400 font-sans text-sm focus:outline-none focus:border-black focus:bg-white transition-all">
                </div>

                <!-- Campo Teléfono -->
                <div class="form-group">
                  <label for="telefono" class="block font-sans text-[11px] font-bold tracking-[0.18em] uppercase text-gray-800 mb-1.5">Teléfono / WhatsApp</label>
                  <input type="tel" id="telefono" name="telefono"
                         [ngModel]="telefono()" (ngModelChange)="telefono.set($event)"
                         placeholder="+57 300 000 0000"
                         class="w-full px-4 py-3.5 rounded-xl bg-gray-50 border border-gray-200 text-gray-900 placeholder-gray-400 font-sans text-sm focus:outline-none focus:border-black focus:bg-white transition-all">
                </div>
              </div>

              <!-- Campo Asunto -->
              <div class="form-group">
                <label for="asunto" class="block font-sans text-[11px] font-bold tracking-[0.18em] uppercase text-gray-800 mb-1.5">Asunto</label>
                <input type="text" id="asunto" name="asunto"
                       [ngModel]="asunto()" (ngModelChange)="asunto.set($event)"
                       placeholder="Tipo de proyecto / ciudad"
                       class="w-full px-4 py-3.5 rounded-xl bg-gray-50 border border-gray-200 text-gray-900 placeholder-gray-400 font-sans text-sm focus:outline-none focus:border-black focus:bg-white transition-all">
              </div>

              <!-- Campo Mensaje -->
              <div class="form-group">
                <label for="mensaje" class="block font-sans text-[11px] font-bold tracking-[0.18em] uppercase text-gray-800 mb-1.5">Mensaje</label>
                <textarea id="mensaje" name="mensaje" rows="3"
                          [ngModel]="mensaje()" (ngModelChange)="mensaje.set($event)"
                          placeholder="¿Cómo podemos ayudarte o asesorarte?"
                          class="w-full px-4 py-3.5 rounded-xl bg-gray-50 border border-gray-200 text-gray-900 placeholder-gray-400 font-sans text-sm focus:outline-none focus:border-black focus:bg-white transition-all resize-none"></textarea>
              </div>

              <!-- Alerta de Error -->
              <div *ngIf="errorMsg()" class="p-3.5 rounded-xl bg-red-50 border border-red-200 text-red-700 text-xs font-sans flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
                <span>{{ errorMsg() }}</span>
              </div>

              <!-- Botón Enviar -->
              <button type="submit" [disabled]="cargando()" class="w-full py-4 mt-3 rounded-xl bg-[#000814] text-white hover:bg-gray-800 flex items-center justify-center gap-3 font-sans font-extrabold text-xs tracking-[0.22em] uppercase transition-all shadow-lg hover:scale-[1.01] cursor-pointer">
                <span *ngIf="!cargando()">Enviar Consulta</span>
                <span *ngIf="cargando()" class="flex items-center gap-2">
                  <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                  Procesando...
                </span>
                <svg *ngIf="!cargando()" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
              </button>
            </form>

            <!-- Pantalla de Éxito al Enviar -->
            <div *ngIf="enviado()" class="py-8 text-center animate-fade space-y-4">
              <div class="w-14 h-14 rounded-full bg-emerald-50 border border-emerald-200 text-emerald-600 flex items-center justify-center mx-auto shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
              </div>
              <h3 class="font-serif text-2xl font-bold text-[#111111]">¡Consulta Recibida con Éxito!</h3>
              <p class="text-gray-600 text-sm font-sans max-w-sm mx-auto leading-relaxed">
                Hemos registrado tu solicitud. Un arquitecto senior te contactará en breve.
              </p>
              <button (click)="nuevaConsulta()" class="px-5 py-2.5 rounded-xl bg-gray-100 hover:bg-gray-200 text-gray-900 font-sans text-xs font-bold uppercase tracking-wider transition-all">
                Enviar otra consulta
              </button>
            </div>
          </div>

          <!-- SECCIÓN BOTONES DE REDES SOCIALES AL FINAL -->
          <div class="pt-6 border-t border-gray-100 mt-6">
            <p class="font-sans text-[10px] font-bold tracking-[0.18em] uppercase text-gray-500 mb-3 text-center sm:text-left">
              O escríbenos en redes oficiales:
            </p>

            <div class="grid grid-cols-2 sm:grid-cols-4 gap-2.5">
              <!-- WhatsApp -->
              <a [href]="whatsappUrl" target="_blank" rel="noopener noreferrer" 
                 class="group flex items-center justify-center gap-2 px-3 py-2.5 rounded-xl bg-gray-50 hover:bg-gray-100 border border-gray-200 hover:border-black transition-all text-gray-800 hover:text-black text-[11px] font-semibold tracking-wider uppercase">
                <svg class="w-3.5 h-3.5 text-emerald-500 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 1.636 6.015L.195 23.518l5.656-1.484A11.95 11.95 0 0 0 11.944 24C18.575 24 24 18.627 24 12S18.575 0 11.944 0zm0 21.986a9.96 9.96 0 0 1-5.074-1.385l-.364-.216-3.765.988 1.006-3.668-.238-.379A9.954 9.954 0 0 1 1.986 12c0-5.492 4.471-9.964 9.958-9.964 5.492 0 9.964 4.472 9.964 9.964 0 5.492-4.472 9.986-9.964 9.986zm5.457-7.466c-.299-.15-1.768-.872-2.042-.971-.274-.1-.474-.15-.674.15-.2.299-.774.971-.949 1.171-.174.2-.349.224-.648.075-.3-.15-1.263-.465-2.404-1.482-.888-.792-1.488-1.769-1.663-2.068-.175-.3-.018-.462.132-.611.135-.135.299-.35.449-.524.15-.175.2-.3.3-.5.1-.2.05-.375-.025-.525-.075-.15-.674-1.624-.924-2.224-.243-.585-.49-.505-.674-.515-.174-.01-.374-.01-.574-.01-.2 0-.524.075-.799.375-.274.3-1.048 1.024-1.048 2.497 0 1.474 1.073 2.898 1.223 3.098.15.2 2.112 3.223 5.116 4.522.715.309 1.274.494 1.708.632.718.228 1.371.196 1.889.119.578-.086 1.768-.723 2.017-1.422.249-.699.249-1.299.174-1.423-.075-.124-.274-.199-.574-.349z"/></svg>
                <span>WhatsApp</span>
              </a>

              <!-- Instagram -->
              <a [href]="contact.instagram" target="_blank" rel="noopener noreferrer"
                 class="group flex items-center justify-center gap-2 px-3 py-2.5 rounded-xl bg-gray-50 hover:bg-gray-100 border border-gray-200 hover:border-black transition-all text-gray-800 hover:text-black text-[11px] font-semibold tracking-wider uppercase">
                <svg class="w-3.5 h-3.5 text-pink-500 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
                <span>Instagram</span>
              </a>

              <!-- LinkedIn -->
              <a [href]="contact.linkedin" target="_blank" rel="noopener noreferrer"
                 class="group flex items-center justify-center gap-2 px-3 py-2.5 rounded-xl bg-gray-50 hover:bg-gray-100 border border-gray-200 hover:border-black transition-all text-gray-800 hover:text-black text-[11px] font-semibold tracking-wider uppercase">
                <svg class="w-3.5 h-3.5 text-blue-500 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
                <span>LinkedIn</span>
              </a>

              <!-- Facebook -->
              <a [href]="contact.facebook" target="_blank" rel="noopener noreferrer"
                 class="group flex items-center justify-center gap-2 px-3 py-2.5 rounded-xl bg-gray-50 hover:bg-gray-100 border border-gray-200 hover:border-black transition-all text-gray-800 hover:text-black text-[11px] font-semibold tracking-wider uppercase">
                <svg class="w-3.5 h-3.5 text-blue-600 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
                <span>Facebook</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- FIN GRILLA NIVEL 1 -->
  </div>
</div>
