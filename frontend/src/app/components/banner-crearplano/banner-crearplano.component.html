<section class="config-banner py-20 bg-white relative overflow-hidden border-b border-black/10">
  <!-- Background architectural ambient glow -->
  <div class="absolute -top-40 -left-40 w-96 h-96 rounded-full bg-wood-accent/15 blur-[120px] pointer-events-none"></div>
  <div class="absolute -bottom-40 -right-40 w-[500px] h-[500px] rounded-full bg-wood-accent/15 blur-[150px] pointer-events-none"></div>
  
  <!-- Architectural background blueprint grid -->
  <div class="absolute inset-0 pointer-events-none opacity-[0.04]" style="background-image: radial-gradient(#002345 1px, transparent 1px); background-size: 32px 32px;"></div>

  <div class="w-full max-w-[1750px] mx-auto px-6 md:px-16 relative z-10">
    <div class="banner-card-luxury relative overflow-visible" data-aos="fade-up">
      <!-- Ejes de plano y cotas arquitectónicas de precisión -->
      <div class="absolute top-0 bottom-0 left-[6%] w-[1px] bg-black/[0.06] pointer-events-none"></div>
      <div class="absolute top-0 bottom-0 right-[6%] w-[1px] bg-black/[0.06] pointer-events-none"></div>
      <div class="absolute left-0 right-0 top-[20%] h-[1px] bg-black/[0.04] pointer-events-none"></div>
      <div class="absolute left-0 right-0 bottom-[20%] h-[1px] bg-black/[0.04] pointer-events-none"></div>
      
      <!-- Cruces técnicas de intersección de ejes -->
      <div class="absolute top-[20%] left-[6%] -translate-x-1/2 -translate-y-1/2 text-black/30 font-mono text-xs select-none pointer-events-none">+</div>
      <div class="absolute top-[20%] right-[6%] translate-x-1/2 -translate-y-1/2 text-black/30 font-mono text-xs select-none pointer-events-none">+</div>
      <div class="absolute bottom-[20%] left-[6%] -translate-x-1/2 translate-y-1/2 text-black/30 font-mono text-xs select-none pointer-events-none">+</div>
      <div class="absolute bottom-[20%] right-[6%] translate-x-1/2 translate-y-1/2 text-black/30 font-mono text-xs select-none pointer-events-none">+</div>
      
      <!-- Marcadores técnicos y cotas -->
      <div class="absolute top-3 left-3 text-[9px] font-mono text-black/30 select-none pointer-events-none">SECCIÓN X-X'</div>
      <div class="absolute bottom-3 left-3 text-[9px] font-mono text-black/30 select-none pointer-events-none">N.P.T. ±0.00m</div>
      <div class="absolute bottom-3 right-3 text-[9px] font-mono text-black/30 select-none pointer-events-none">ESC 1:50</div>

      <!-- Trazos esquineros de planos (Offset) -->
      <div class="absolute -top-2.5 -left-2.5 w-7 h-7 border-t border-l border-black/20 pointer-events-none rounded-tl-sm"></div>
      <div class="absolute -top-2.5 -right-2.5 w-7 h-7 border-t border-r border-black/20 pointer-events-none rounded-tr-sm"></div>
      <div class="absolute -bottom-2.5 -left-2.5 w-7 h-7 border-b border-l border-black/20 pointer-events-none rounded-bl-sm"></div>
      <div class="absolute -bottom-2.5 -right-2.5 w-7 h-7 border-b border-r border-black/20 pointer-events-none rounded-br-sm"></div>

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-center py-4">
        <!-- Left Column: Title & Description (Cols 1-8) -->
        <div class="lg:col-span-8 text-left">
          <h3 class="font-serif text-3xl md:text-4xl lg:text-5xl font-bold text-[#111111] tracking-tight leading-[1.15] mb-4 uppercase">
            ASESÓRATE Y COTIZA TU OBRA CON <span class="text-[#4C7AA6] font-bold underline decoration-[#002345]/30 decoration-2 underline-offset-8 uppercase">ARQUITECTOS SENIOR</span>
          </h3>
          <p class="text-gray-600 text-base md:text-lg font-sans leading-relaxed max-w-3xl font-light">
            Recibe dirección ejecutiva, estudio de viabilidad técnica y un presupuesto integral blindado a la medida de tu proyecto.
          </p>
        </div>

        <!-- Right Column: CTA Button (Cols 9-12) -->
        <div class="lg:col-span-4 flex flex-col items-center lg:items-end justify-center text-center lg:text-right">
          <a routerLink="/cotiza-con-nosotros" class="cta-architect-btn group w-full sm:w-auto">
            <div class="cta-inner flex items-center justify-between gap-6 px-8 py-4">
              <span class="font-sans text-sm md:text-base font-bold tracking-[0.18em] uppercase text-white whitespace-nowrap pl-1">
                Cotiza con Nosotros
              </span>
              <div class="w-10 h-10 rounded-lg bg-white/20 text-white flex items-center justify-center shrink-0 group-hover:scale-105 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
              </div>
            </div>
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
