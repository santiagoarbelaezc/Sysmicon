<div class="service-card-wrapper rounded-2xl border border-black/15 bg-white shadow-[0_20px_50px_rgba(0,0,0,0.04)] hover:shadow-[0_30px_70px_rgba(0,0,0,0.09)] transition-all duration-500 overflow-hidden relative group"
     [ngClass]="{'border-wood-accent/60 ring-1 ring-wood-accent/30': servicio.pilarPrincipal}">
  
  <!-- Etiqueta superior opcional de Pilar Principal -->
  <div *ngIf="servicio.pilarPrincipal" class="bg-[#0A0A0A] text-white px-6 py-2.5 flex items-center justify-between border-b border-white/10 font-mono text-xs tracking-widest uppercase">
    <span class="flex items-center gap-2 text-wood-accent font-bold">
      <span class="w-2 h-2 rounded-full bg-wood-accent animate-ping"></span>
      ★ PILAR INTEGRAL SYSMICON — DISEÑO Y OBRA
    </span>
    <span class="text-white/60 hidden sm:inline">CAPACIDAD 360°</span>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-12 min-h-[480px]">
    <!-- COLUMNA IZQUIERDA: IMAGEN DE PROYECTO TIPO CATÁLOGO PURA (Cols 1-5) -->
    <div class="lg:col-span-5 relative overflow-hidden bg-[#0A0A0A] min-h-[380px] lg:min-h-full flex flex-col justify-center items-center p-8 group/img">
      <!-- Imagen de proyecto real como fondo tipo catálogo -->
      <div *ngIf="servicio.imagen" 
           class="absolute inset-0 bg-cover bg-center transition-transform duration-[12000ms] group-hover/img:scale-110 opacity-85"
           [style.background-image]="'url(\'' + servicio.imagen + '\')'">
      </div>
      
      <!-- Gradiente suave para que el texto resalte con máxima claridad y contraste -->
      <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/35 to-black/80"></div>
      
      <!-- Trazos esquineros arquitectónicos puros (Sin números ni textos saturados) -->
      <div class="absolute top-6 left-6 w-8 h-8 border-t border-l border-white/35 pointer-events-none"></div>
      <div class="absolute top-6 right-6 w-8 h-8 border-t border-r border-white/35 pointer-events-none"></div>
      <div class="absolute bottom-6 left-6 w-8 h-8 border-b border-l border-white/35 pointer-events-none"></div>
      <div class="absolute bottom-6 right-6 w-8 h-8 border-b border-r border-white/35 pointer-events-none"></div>

      <!-- TEXTO TIPO CATÁLOGO EN EL CENTRO EXACTO (Editorial y limpio) -->
      <div class="relative z-20 text-center px-4 pointer-events-none transition-all duration-700 group-hover/img:scale-[1.03]">
        <h3 class="font-serif text-3xl sm:text-4xl lg:text-5xl font-light tracking-[0.26em] text-white uppercase drop-shadow-[0_12px_25px_rgba(0,0,0,0.95)]">
          {{ servicio.titulo }}
        </h3>
      </div>

      <!-- Subtítulo de fase abajo, discreto y sin numeración -->
      <div *ngIf="servicio.fase" class="absolute bottom-7 inset-x-0 text-center pointer-events-none z-20">
        <span class="font-mono text-[11px] text-white/80 tracking-[0.28em] uppercase drop-shadow">
          {{ servicio.fase }}
        </span>
      </div>
    </div>

    <!-- COLUMNA DERECHA: CONTENIDO Y CARACTERÍSTICAS EN FONDO BLANCO (Cols 6-12) -->
    <div class="lg:col-span-7 p-8 md:p-11 lg:p-12 flex flex-col justify-between bg-white relative">
      <!-- Trazos de esquina de plano en la caja blanca -->
      <div class="absolute top-5 right-5 font-mono text-gray-300 text-xs pointer-events-none">+</div>
      <div class="absolute bottom-5 left-5 font-mono text-gray-300 text-xs pointer-events-none">+</div>

      <!-- Cabecera con Subtítulo, Título y Línea separadora -->
      <div>
        <p class="font-sans text-xs font-bold uppercase tracking-[0.16em] text-wood-dark mb-1.5 flex items-center gap-2">
          <span class="w-6 h-[2px] bg-wood-accent inline-block"></span>
          {{ servicio.subtitulo }}
        </p>
        <h3 class="font-serif text-2xl md:text-3xl font-bold text-[#111111] mb-4 leading-tight group-hover:text-black transition-colors">
          {{ servicio.titulo }}
        </h3>
        
        <p class="font-sans text-gray-700 text-sm md:text-base leading-relaxed mb-8">
          {{ servicio.descripcion }}
        </p>

        <!-- Lista de Características / Puntos clave -->
        <div *ngIf="servicio.caracteristicas && servicio.caracteristicas.length > 0" class="mb-8 border-t border-black/10 pt-6">
          <p class="font-serif text-xs font-bold uppercase tracking-wider text-gray-400 mb-4">Lo que incluye este servicio:</p>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3.5">
            <div *ngFor="let item of servicio.caracteristicas" class="flex items-start gap-3">
              <span class="w-5 h-5 rounded-full bg-[#111111] text-white text-[10px] font-bold flex items-center justify-center shrink-0 mt-0.5 group-hover:bg-wood-dark transition-colors">
                ✓
              </span>
              <span class="font-sans text-xs md:text-sm text-gray-800 font-medium leading-snug">
                {{ item }}
              </span>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer CTA y Accesos Rápidos -->
      <div class="pt-6 border-t border-black/10 flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-4 mt-auto">
        <a routerLink="/contacto" [queryParams]="{servicio: servicio.titulo}" 
           class="inline-flex items-center justify-center gap-3 px-7 py-3.5 rounded-lg bg-[#111111] hover:bg-black text-white font-sans text-xs md:text-sm font-bold tracking-[0.12em] uppercase transition-all duration-300 hover:translate-x-1 shadow-md hover:shadow-xl">
          <span>Solicitar Cotización Privada</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </a>

        <!-- Botón secundario al configurador sin mención de CAD -->
        <a *ngIf="servicio.pilarPrincipal" routerLink="/crea-tu-diseno" 
           class="inline-flex items-center justify-center gap-2 px-5 py-3.5 rounded-lg border border-black/15 hover:border-black text-[#111111] font-sans text-xs font-bold tracking-wider uppercase hover:bg-black/5 transition-all">
          <span>Explorar Configurador</span>
          <span class="font-mono text-wood-dark">➔</span>
        </a>
      </div>
    </div>
  </div>
</div>
