<div class="test-card glass-card">
  <div class="quote-icon font-serif">“</div>
  
  <div class="stars">
    <span *ngFor="let s of getStarsArray()" class="star">★</span>
  </div>

  <p class="comment font-sans">{{ testimonio.comentario }}</p>

  <div class="divider-wood"></div>

  <div class="client-info">
    <div class="client-meta">
      <h4 class="client-name font-serif">{{ testimonio.cliente }}</h4>
      <span class="client-role font-sans">{{ testimonio.puesto }}</span>
      <span class="client-project font-sans">📌 {{ testimonio.proyectoNombre }}</span>
    </div>
  </div>
</div>
