<div class="home-page">
  <!-- 1. Hero Section -->
  <app-hero></app-hero>

  <!-- 2. About Section -->
  <app-about></app-about>

  <!-- 3. Servicios Section -->
  <section id="servicios-section" class="services-section section-padding bg-white text-[#1A1A1A] border-y border-black/10 relative overflow-hidden">
    <div class="w-full max-w-[1750px] mx-auto px-6 md:px-16 relative z-10">
      <div class="section-header text-center mb-20">
        <div class="inline-flex items-center gap-3 px-4 py-1.5 rounded-full border border-black/10 bg-[#F8F8F8] font-sans text-xs font-bold tracking-widest uppercase text-gray-800 mb-4">
          <span class="w-2 h-2 rounded-full bg-gray-400"></span>
          <span>Nuestros Servicios</span>
          <span class="w-2 h-2 rounded-full bg-gray-400"></span>
        </div>
        <h2 class="title-lg font-serif text-4xl md:text-5xl font-bold tracking-tight text-[#111111]">
          Soluciones arquitectónicas de <span class="text-gray-500 italic font-serif">principio a fin</span>
        </h2>
        <div class="w-20 h-[2px] bg-gray-300 mx-auto my-6"></div>
      </div>

      <!-- Services Editorial 2x2 Grid -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 lg:gap-14 mt-8 max-w-[1550px] mx-auto services-grid">
        <app-service-card *ngFor="let s of servicios; let i = index" [servicio]="s" [index]="i"></app-service-card>
      </div>
    </div>
  </section>
  <!-- 4. Banner CTA Intermedio Standalone (Configurador 3D) -->
  <app-banner-crearplano></app-banner-crearplano>

  <!-- 5. Portafolio / Proyectos Destacados Section (Modularizado en ProjectsComponent) -->
  <app-projects></app-projects>

  <!-- 6. Testimonios Section (Modularizado en TestimoniosComponent) -->
  <app-testimonios></app-testimonios>

  <!-- 7. Preview Contacto Section -->
  <section class="contact-preview-section section-padding">
    <div class="container">
      <div class="contact-preview-card glass-panel">
        <div class="preview-content">
          <div class="section-tag font-sans">
            <span class="tag-line"></span>
            <span>Contacto Directo</span>
          </div>
          <h2 class="title-md font-serif">¿Tienes un terreno o un sueño en mente?</h2>
          <p class="preview-desc">
            Nuestros arquitectos están listos para escucharte. Agenda una consulta de viabilidad técnica y presupuestal sin costo.
          </p>
        </div>
        <div class="preview-actions">
          <a routerLink="/contacto" class="btn-primary">
            <span>Agendar Cita Privada</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </a>
          <a href="https://www.instagram.com/sysmicon/" target="_blank" class="btn-secondary">
            <span>Ver Instagram &#64;sysmicon</span>
          </a>
        </div>
      </div>
    </div>
  </section>
</div>
