<header class="navbar" [ngClass]="{'scrolled': isScrolled() && !isAuthPage, 'auth-solid': isAuthPage, 'home-transparent': isHomePage && !isScrolled()}">
  <div class="w-full max-w-[1800px] mx-auto px-6 md:px-12 navbar-container flex items-center justify-between">
    <!-- Logo -->
    <a routerLink="/" class="navbar-logo group flex items-center gap-3 z-[1001]" (click)="closeMobileMenu()">
      <img src="assets/icons/logo-sysmico-navbar.png" alt="Sysmicon" class="w-10 h-10 md:w-11 md:h-11 object-contain transition-transform duration-300 group-hover:scale-105">
      <span class="logo-text font-serif">{{ brandName }}</span>
    </a>

    <!-- Desktop Nav Links -->
    <nav class="desktop-nav">
      <ul class="nav-list flex items-center gap-16">
        <li *ngFor="let link of navLinks">
          <a [routerLink]="link.path" 
             routerLinkActive="active" 
             [routerLinkActiveOptions]="{exact: link.path === '/'}"
             (click)="onNavLinkClick(link)"
             class="nav-link font-sans">
            {{ link.label }}
            <span class="link-underline"></span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Desktop Right Actions -->
    <div class="desktop-actions flex items-center gap-8">
      <!-- Auth Links / User Profile -->
      <div class="auth-links flex items-center gap-6 font-sans text-sm">
        <ng-container *ngIf="!authService.isLoggedIn()">
          <a routerLink="/login" class="font-semibold text-white/90 hover:text-[#C2E1FF] transition-colors">Ingresar</a>
          <a routerLink="/registro" class="px-5 py-2.5 rounded-full border border-[#C2E1FF]/50 bg-[#C2E1FF]/15 hover:bg-[#C2E1FF] text-white hover:text-[#00060e] transition-all font-sans text-xs font-extrabold tracking-wider uppercase shadow-lg">Registrarse</a>
        </ng-container>

        <ng-container *ngIf="authService.currentUser() as user">
          <a routerLink="/admin" title="Ir al Portal Admin" class="flex items-center gap-2 bg-[#001A33] hover:bg-[#242424] px-3.5 py-1.5 rounded-full border border-wood-accent/40 hover:border-wood-accent shadow-sm animate-fade transition-all cursor-pointer">
            <span class="w-6 h-6 rounded-full bg-wood-accent text-[#002345] font-bold text-xs flex items-center justify-center">{{ user.nombre.charAt(0) }}</span>
            <span class="font-bold text-wood-light truncate max-w-[100px]">{{ user.nombre }}</span>
            <span class="bg-wood-accent/20 text-wood-accent text-[10px] font-extrabold px-2 py-0.5 rounded">ADMIN</span>
            <button (click)="authService.logout(); $event.stopPropagation(); $event.preventDefault()" title="Cerrar sesión" class="text-gray-400 hover:text-red-400 font-bold ml-0.5 transition-colors cursor-pointer relative z-10">✕</button>
          </a>
        </ng-container>
      </div>
    </div>

    <!-- Mobile Hamburger Trigger -->
    <button class="mobile-toggle flex flex-col justify-between w-8 h-[22px] z-[1001]" 
            (click)="toggleMobileMenu()" 
            [ngClass]="{'open': isMobileMenuOpen()}"
            aria-label="Abrir menú de navegación">
      <span class="bar bar-1"></span>
      <span class="bar bar-2"></span>
      <span class="bar bar-3"></span>
    </button>
  </div>

  <!-- Fullscreen Mobile Menu Overlay -->
  <div class="mobile-menu-overlay" [ngClass]="{'active': isMobileMenuOpen()}">
    <div class="mobile-menu-content">
      <ul class="mobile-nav-list">
        <li *ngFor="let link of navLinks; let i = index" [style.transition-delay]="(i * 100) + 'ms'">
          <a [routerLink]="link.path" 
             routerLinkActive="active" 
             [routerLinkActiveOptions]="{exact: link.path === '/'}"
             (click)="onNavLinkClick(link)"
             class="mobile-nav-link font-serif">
            {{ link.label }}
          </a>
        </li>
      </ul>

      <div class="mobile-menu-footer">
        <!-- Mobile Auth -->
        <div class="flex flex-col items-center justify-center gap-3 my-4 font-sans text-base">
          <ng-container *ngIf="!authService.isLoggedIn()">
            <div class="flex items-center gap-6">
              <a routerLink="/login" (click)="closeMobileMenu()" class="text-white/90 hover:text-[#C2E1FF] font-semibold">Ingresar</a>
              <a routerLink="/registro" (click)="closeMobileMenu()" class="px-5 py-2 rounded-full border border-[#C2E1FF]/50 bg-[#C2E1FF]/15 hover:bg-[#C2E1FF] text-white hover:text-[#00060e] font-sans text-xs font-extrabold tracking-wider uppercase">Registrarse</a>
            </div>
          </ng-container>
          <ng-container *ngIf="authService.currentUser() as user">
            <div class="flex flex-col gap-2 bg-[#001A33] px-4 py-3 rounded-xl border border-wood-accent/40 w-full max-w-[280px]">
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-2">
                  <span class="w-7 h-7 rounded-full bg-wood-accent text-[#002345] font-bold text-sm flex items-center justify-center">{{ user.nombre.charAt(0) }}</span>
                  <span class="font-bold text-wood-light text-sm truncate max-w-[130px]">{{ user.nombre }}</span>
                </div>
                <button (click)="authService.logout(); closeMobileMenu()" class="text-xs bg-red-950/60 text-red-300 border border-red-800/40 px-2.5 py-1 rounded-lg">Salir</button>
              </div>
              <a routerLink="/admin" (click)="closeMobileMenu()" class="w-full text-center py-1.5 rounded-lg bg-wood-accent text-[#002345] font-extrabold text-xs tracking-wider uppercase transition-transform hover:scale-[1.02]">
                ⚡ Entrar al Portal Admin
              </a>
            </div>
          </ng-container>
        </div>

        <div class="mobile-socials mt-6">
          <a href="https://www.instagram.com/sysmicon/" target="_blank" rel="noopener noreferrer">Instagram &#64;sysmicon</a>
        </div>
      </div>
    </div>
  </div>
</header>
