<header class="navbar" [ngClass]="{'scrolled': isScrolled()}">
  <div class="w-full max-w-[1800px] mx-auto px-6 md:px-12 navbar-container flex items-center justify-between">
    <!-- Logo -->
    <a routerLink="/" class="navbar-logo flex items-center gap-3 z-[1001]" (click)="closeMobileMenu()">
      <span class="logo-mark font-serif">S</span>
      <span class="logo-text font-serif">{{ brandName }}</span>
    </a>

    <!-- Desktop Nav Links -->
    <nav class="desktop-nav">
      <ul class="nav-list flex items-center gap-16">
        <li *ngFor="let link of navLinks">
          <a [routerLink]="link.path" 
             routerLinkActive="active" 
             [routerLinkActiveOptions]="{exact: link.path === '/'}"
             class="nav-link font-sans">
            {{ link.label }}
            <span class="link-underline"></span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Desktop Right Actions -->
    <div class="desktop-actions flex items-center gap-12">
      <!-- Language Switcher -->
      <div class="lang-switcher flex items-center gap-2 font-sans text-sm font-semibold">
        <button (click)="setLang('ES')" [ngClass]="{'text-wood-light font-bold': currentLang() === 'ES', 'text-white/60 hover:text-white': currentLang() !== 'ES'}" class="transition-colors py-1 px-1.5 rounded">ES</button>
        <span class="text-white/30">/</span>
        <button (click)="setLang('EN')" [ngClass]="{'text-wood-light font-bold': currentLang() === 'EN', 'text-white/60 hover:text-white': currentLang() !== 'EN'}" class="transition-colors py-1 px-1.5 rounded">EN</button>
      </div>

      <!-- Auth Links / User Profile -->
      <div class="auth-links flex items-center gap-6 font-sans text-sm">
        <ng-container *ngIf="!authService.isLoggedIn()">
          <a routerLink="/login" class="font-semibold text-white/90 hover:text-wood-light transition-colors">Ingresar</a>
          <a routerLink="/registro" class="px-4 py-2 rounded-md border border-white/20 hover:border-wood-light hover:bg-wood-subtle text-white hover:text-wood-light transition-all font-semibold">Registrarse</a>
        </ng-container>

        <ng-container *ngIf="authService.currentUser() as user">
          <div class="flex items-center gap-3 bg-[#161616] px-3.5 py-1.5 rounded-full border border-wood-accent/30 shadow-sm animate-fade">
            <span class="w-6 h-6 rounded-full bg-wood-accent text-[#111] font-bold text-xs flex items-center justify-center">{{ user.nombre.charAt(0) }}</span>
            <span class="font-bold text-wood-light truncate max-w-[120px]">{{ user.nombre }}</span>
            <button (click)="authService.logout()" title="Cerrar sesión" class="text-gray-400 hover:text-red-400 font-bold ml-1 transition-colors cursor-pointer">✕</button>
          </div>
        </ng-container>
      </div>

      <!-- Desktop CTA Button -->
      <a routerLink="/crea-tu-diseno" class="nav-cta-btn inline-flex items-center gap-2">
        <span>Cotizar Proyecto</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </a>
    </div>

    <!-- Mobile Hamburger Trigger -->
    <button class="mobile-toggle flex flex-col justify-between w-8 h-[22px] z-[1001]" 
            (click)="toggleMobileMenu()" 
            [ngClass]="{'open': isMobileMenuOpen()}"
            aria-label="Abrir menú de navegación">
      <span class="bar bar-1"></span>
      <span class="bar bar-2"></span>
      <span class="bar bar-3"></span>
    </button>
  </div>

  <!-- Fullscreen Mobile Menu Overlay -->
  <div class="mobile-menu-overlay" [ngClass]="{'active': isMobileMenuOpen()}">
    <div class="mobile-menu-content">
      <ul class="mobile-nav-list">
        <li *ngFor="let link of navLinks; let i = index" [style.transition-delay]="(i * 100) + 'ms'">
          <a [routerLink]="link.path" 
             routerLinkActive="active" 
             [routerLinkActiveOptions]="{exact: link.path === '/'}"
             (click)="closeMobileMenu()"
             class="mobile-nav-link font-serif">
            {{ link.label }}
          </a>
        </li>
      </ul>

      <div class="mobile-menu-footer">
        <!-- Mobile Auth & Lang -->
        <div class="flex flex-col items-center justify-center gap-3 my-4 font-sans text-base">
          <ng-container *ngIf="!authService.isLoggedIn()">
            <div class="flex items-center gap-6">
              <a routerLink="/login" (click)="closeMobileMenu()" class="text-white/90 hover:text-wood-light font-semibold">Ingresar</a>
              <a routerLink="/registro" (click)="closeMobileMenu()" class="px-4 py-1.5 rounded-md border border-white/20 text-white font-semibold">Registrarse</a>
            </div>
          </ng-container>
          <ng-container *ngIf="authService.currentUser() as user">
            <div class="flex items-center gap-3 bg-[#181818] px-4 py-2 rounded-xl border border-wood-accent/40 w-full justify-between max-w-[280px]">
              <div class="flex items-center gap-2">
                <span class="w-7 h-7 rounded-full bg-wood-accent text-[#111] font-bold text-sm flex items-center justify-center">{{ user.nombre.charAt(0) }}</span>
                <span class="font-bold text-wood-light text-sm truncate max-w-[130px]">{{ user.nombre }}</span>
              </div>
              <button (click)="authService.logout(); closeMobileMenu()" class="text-xs bg-red-950/60 text-red-300 border border-red-800/40 px-3 py-1 rounded-lg">Salir</button>
            </div>
          </ng-container>
        </div>
        <div class="flex items-center justify-center gap-3 my-2 font-sans text-sm font-semibold">
          <button (click)="setLang('ES')" [ngClass]="{'text-wood-light font-bold': currentLang() === 'ES', 'text-white/60': currentLang() !== 'ES'}">ES</button>
          <span class="text-white/30">/</span>
          <button (click)="setLang('EN')" [ngClass]="{'text-wood-light font-bold': currentLang() === 'EN', 'text-white/60': currentLang() !== 'EN'}">EN</button>
        </div>

        <a routerLink="/crea-tu-diseno" (click)="closeMobileMenu()" class="mobile-cta-btn mt-3">
          Cotizar Proyecto en Línea
        </a>
        <div class="mobile-socials">
          <a href="https://www.instagram.com/sysmicon/" target="_blank" rel="noopener noreferrer">Instagram &#64;sysmicon</a>
        </div>
      </div>
    </div>
  </div>
</header>
