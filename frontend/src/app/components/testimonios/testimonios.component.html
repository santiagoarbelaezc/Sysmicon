<!-- Testimonios Section (Diseño Carrusel a Ancho Completo) -->
<section id="testimonios-section" class="testimonials-section section-padding py-16 md:py-24 bg-[#FAFAFA] border-t border-b border-black/5">
  <div class="container">
    <div class="section-header text-center mb-12">
      <div class="section-tag font-sans">
        <span class="tag-line"></span>
        <span>Voces de Excelencia</span>
        <span class="tag-line"></span>
      </div>
      <h2 class="title-lg font-serif text-gray-900">
        La experiencia de construir con <span class="text-accent font-serif">Sysmicon</span>
      </h2>
      <div class="divider-wood"></div>
      <p class="subtitle mx-auto text-gray-600 max-w-xl">
        El testimonio más valioso de nuestro trabajo es la satisfacción y tranquilidad de las familias que habitan nuestras creaciones.
      </p>
    </div>

    <!-- Testimonials Carousel Container -->
    <div class="relative w-full max-w-4xl mx-auto px-4 md:px-12 select-none group">
      
      <!-- Carrusel Track viewport -->
      <div class="overflow-hidden w-full">
        <div class="flex transition-transform duration-500 ease-[cubic-bezier(0.25,1,0.5,1)]"
             [style.width]="(testimonios.length * 100) + '%'"
             [style.transform]="'translateX(-' + (activeTestimonioIndex() * (100 / testimonios.length)) + '%)'">
          
          <div *ngFor="let t of testimonios; let i = index" 
               [style.width]="(100 / testimonios.length) + '%'"
               class="px-2 md:px-4 flex-shrink-0">
            <app-testimonial-card [testimonio]="t" [index]="i"></app-testimonial-card>
          </div>
          
        </div>
      </div>

      <!-- Botón Navegación Izquierda -->
      <button (click)="prevTestimonio()" 
              class="absolute left-0 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-white border border-black/5 flex items-center justify-center text-gray-700 hover:text-wood-accent hover:border-wood-accent/30 shadow-md cursor-pointer transition-all hover:scale-105 active:scale-95 z-20">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>

      <!-- Botón Navegación Derecha -->
      <button (click)="nextTestimonio()" 
              class="absolute right-0 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-white border border-black/5 flex items-center justify-center text-gray-700 hover:text-wood-accent hover:border-wood-accent/30 shadow-md cursor-pointer transition-all hover:scale-105 active:scale-95 z-20">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

    </div>

    <!-- Indicadores (Dots) -->
    <div class="flex justify-center gap-2 mt-8">
      <button *ngFor="let dot of testimonios; let i = index" 
              (click)="setTestimonio(i)" 
              [class.active]="i === activeTestimonioIndex()"
              class="dot-indicator w-2.5 h-2.5 rounded-full bg-gray-300 transition-all cursor-pointer"
              [ngClass]="{'w-8 bg-wood-accent shadow-sm': i === activeTestimonioIndex()}"></button>
    </div>

  </div>
</section>
