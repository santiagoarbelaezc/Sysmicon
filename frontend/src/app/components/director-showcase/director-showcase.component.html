<section class="director-section py-16 md:py-24 bg-[#000814] text-white border-y border-white/10 relative overflow-hidden flex items-center">
  <!-- Luces ambientales de fondo arquitectónico sutiles y sobrias -->
  <div class="absolute -top-32 left-1/4 w-[700px] h-[700px] rounded-full bg-[#002345]/25 blur-[180px] pointer-events-none"></div>
  <div class="absolute bottom-0 right-10 w-[600px] h-[600px] rounded-full bg-[#C2E1FF]/08 blur-[160px] pointer-events-none"></div>

  <div class="w-full max-w-[1680px] mx-auto px-6 md:px-16 relative z-10 my-auto">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-20 items-center justify-center">
      
      <!-- Columna Izquierda: Fotografía Gran Formato Centrada y Sobria (Cols 1-5) -->
      <div class="lg:col-span-5 flex justify-center lg:justify-end">
        <div class="relative w-full max-w-[480px]">
          <!-- Recuadro exterior decorativo arquitectónico fino -->
          <div class="absolute -top-5 -left-5 w-full h-full border border-white/10 rounded-xl pointer-events-none hidden sm:block"></div>
          <div class="absolute -bottom-5 -right-5 w-full h-full border border-white/10 rounded-xl pointer-events-none hidden sm:block"></div>
          
          <!-- Contenedor Principal de la Imagen -->
          <div class="relative z-10 w-full h-[480px] sm:h-[560px] lg:h-[600px] overflow-hidden rounded-xl bg-[#001226] border border-white/15 shadow-[0_30px_80px_rgba(0,0,0,0.95)] group">
            <img src="assets/images/juanmoreno.jpg" 
                 alt="Juan Moreno - Ingeniero Director General y Ejecución en Sysmicon" 
                 class="w-full h-full object-cover object-top filter contrast-[1.03] transition-transform duration-1000 group-hover:scale-102">
            <!-- Gradiente sutil inferior para profundidad fotográfica -->
            <div class="absolute inset-0 bg-gradient-to-t from-[#000814]/40 via-transparent to-transparent opacity-60 pointer-events-none"></div>
          </div>
        </div>
      </div>

      <!-- Columna Derecha: Editorial Minimalista, Muy Sobrio y Elegante (Cols 6-12) -->
      <div class="lg:col-span-7 flex flex-col justify-center items-center lg:items-start text-center lg:text-left space-y-6 my-auto">
        
        <!-- Etiqueta Editorial Sobria y Distinguida -->
        <div>
          <div class="flex items-center gap-3.5 mb-4 justify-center lg:justify-start">
            <span class="w-8 h-[1px] bg-white/40"></span>
            <span class="font-sans text-[11px] tracking-[0.32em] uppercase text-white/80 font-medium">
              Detrás del Diseño y la Construcción
            </span>
          </div>

          <!-- Título Editorial Sobrio -->
          <h2 class="font-serif text-5xl sm:text-6xl lg:text-7xl font-light text-white tracking-tight leading-[0.98] mb-2.5">
            Juan Moreno
          </h2>
          
          <p class="font-sans text-xs sm:text-sm tracking-[0.28em] uppercase text-white/60 font-light">
            Ingeniero Director General y Ejecución
          </p>
        </div>

        <!-- Línea Separadora Sobria -->
        <div class="w-16 h-[1px] bg-white/25"></div>

        <!-- Texto Claro, Normal y Directo en Tipografía Editorial -->
        <p class="font-serif italic text-xl sm:text-2xl text-white/90 font-light leading-relaxed max-w-2xl">
          "Dirigimos y construimos cada proyecto con el compromiso de hacer realidad tus ideas, cumpliendo estrictamente con los tiempos de entrega y cuidando cada peso de tu presupuesto."
        </p>

        <!-- Botón Sobrio y Distinguido de Alta Joyería Arquitectónica -->
        <div class="pt-3">
          <a routerLink="/cotiza-con-nosotros" class="group inline-flex items-center gap-4 px-8 py-4 rounded bg-transparent hover:bg-white text-white hover:text-[#000814] border border-white/30 hover:border-white transition-all duration-500 font-sans text-[11px] font-semibold tracking-[0.28em] uppercase cursor-pointer">
            <span>Agendar Cita Privada</span>
            <svg class="w-4 h-4 transform group-hover:translate-x-1.5 transition-transform duration-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </a>
        </div>

      </div>

    </div>
  </div>
</section>
